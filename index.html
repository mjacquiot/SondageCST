<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sondage CGT-CFDT | CC Marches du Velay Rochebaron</title>
  <meta name="description"
    content="Sondage de fin de mandat CGT-CFDT pour les agents de la Communauté de Communes Marches du Velay Rochebaron">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg-deep: #1e293b;
      --bg-card: rgba(255, 255, 255, 0.06);
      --bg-card-hover: rgba(255, 255, 255, 0.1);
      --glass: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --accent: #ff6b35;
      --accent2: #ffd166;
      --accent3: #06d6a0;
      --accent4: #118ab2;
      --text: #f8fafc;
      --text-dim: rgba(248, 250, 252, 0.7);
      --text-muted: rgba(248, 250, 252, 0.4);
      --danger: #ef476f;
      --success: #06d6a0;
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 0.35s cubic-bezier(.4, 0, .2, 1);
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 0%, rgba(255, 107, 53, 0.1) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(6, 214, 160, 0.07) 0%, transparent 50%), radial-gradient(ellipse at 50% 50%, rgba(17, 138, 178, 0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 20s ease-in-out infinite
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: var(--accent);
      top: -100px;
      left: -100px;
      animation-delay: 0s
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: var(--accent4);
      bottom: -80px;
      right: -80px;
      animation-delay: -7s
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: var(--accent3);
      top: 50%;
      left: 60%;
      animation-delay: -14s
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1)
      }

      25% {
        transform: translate(30px, -40px) scale(1.05)
      }

      50% {
        transform: translate(-20px, 30px) scale(0.95)
      }

      75% {
        transform: translate(40px, 20px) scale(1.02)
      }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    .hidden {
      display: none !important
    }

    /* Header */
    .header {
      text-align: center;
      padding: 30px 0 10px
    }

    .header .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 209, 102, 0.2));
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 16px
    }

    .header h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, var(--accent2) 50%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 8px
    }

    .header .subtitle {
      color: var(--text-dim);
      font-size: 0.95rem;
      max-width: 560px;
      margin: 0 auto
    }

    /* Progress */
    .progress-wrap {
      margin: 24px 0;
      position: sticky;
      top: 12px;
      z-index: 50
    }

    .progress-bar {
      height: 6px;
      background: var(--glass);
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(10px)
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 20px;
      transition: width 0.6s cubic-bezier(.4, 0, .2, 1);
      width: 0%
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.8rem;
      color: var(--text-dim)
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
      animation: fadeUp 0.5s ease forwards;
      opacity: 0;
      transform: translateY(20px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04)
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .card.intro-card {
      background: linear-gradient(135deg, rgba(232, 57, 28, 0.06), rgba(0, 158, 96, 0.05));
      border-color: rgba(232, 57, 28, 0.15)
    }

    /* Section titles */
    .section-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 16px
    }

    .section-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 6px
    }

    .section-desc {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-bottom: 28px
    }

    /* Questions */
    .question {
      margin-bottom: 28px
    }

    .question:last-child {
      margin-bottom: 0
    }

    .q-label {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 14px;
      display: block;
      line-height: 1.5
    }

    .q-label .q-num {
      color: var(--accent);
      font-weight: 700;
      margin-right: 6px
    }

    /* Radio & Checkbox */
    .options {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .opt {
      position: relative;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      transition: var(--transition);
      font-size: 0.95rem
    }

    .opt:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.2)
    }

    .opt input {
      display: none
    }

    .opt .mark {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--text-muted);
      transition: var(--transition);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .opt input:checked~.mark {
      border-color: var(--accent);
      background: var(--accent)
    }

    .opt input:checked~.mark::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #fff
    }

    .opt.checkbox .mark {
      border-radius: 5px
    }

    .opt.checkbox input:checked~.mark::after {
      content: '✓';
      font-size: 12px;
      color: #fff;
      width: auto;
      height: auto;
      border-radius: 0;
      background: none
    }

    .opt input:checked~.opt-text {
      color: var(--text);
      font-weight: 600
    }

    .opt-text {
      color: var(--text-dim);
      transition: var(--transition)
    }

    /* Rating scale */
    .rating-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    .rating-row .opt {
      flex: 1;
      min-width: 50px;
      justify-content: center;
      padding: 14px 8px;
      flex-direction: column;
      align-items: center;
      gap: 6px
    }

    .rating-row .opt .opt-text {
      font-weight: 800;
      font-size: 1.2rem
    }

    .rating-row .opt .opt-sublabel {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
      transition: var(--transition)
    }

    .rating-row .opt input:checked~.opt-sublabel {
      color: var(--accent2)
    }

    /* Free text for Autre */
    .autre-input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
      margin-top: 8px;
      transition: var(--transition)
    }

    .autre-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 57, 28, 0.12)
    }

    .autre-input::placeholder {
      color: var(--text-muted)
    }

    /* Textarea */
    .text-input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 90px;
      transition: var(--transition);
      outline: none
    }

    .text-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 57, 28, 0.12)
    }

    .text-input::placeholder {
      color: var(--text-muted)
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      margin-top: 28px;
      flex-wrap: wrap
    }

    .btn {
      padding: 14px 32px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 8px
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 4px 16px rgba(220, 38, 38, 0.2)
    }

    .btn-danger:hover {
      background: #b91c1c;
      transform: translateY(-1px)
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #ff6b35);
      color: #fff;
      box-shadow: 0 4px 20px rgba(232, 57, 28, 0.25)
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(232, 57, 28, 0.35)
    }

    .btn-secondary {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--glass-border)
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover)
    }

    .btn-success {
      background: linear-gradient(135deg, var(--accent3), #00c771);
      color: #fff;
      box-shadow: 0 4px 20px rgba(0, 158, 96, 0.25)
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important
    }

    /* Thank you */
    .thankyou {
      text-align: center;
      padding: 60px 20px
    }

    .thankyou .check-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent3), #00c771);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 48px;
      animation: popIn 0.6s cubic-bezier(.17, .67, .35, 1.5);
      color: #fff
    }

    @keyframes popIn {
      0% {
        transform: scale(0)
      }

      100% {
        transform: scale(1)
      }
    }

    .thankyou h2 {
      font-size: 1.8rem;
      margin-bottom: 12px
    }

    /* Admin */
    .admin-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px
    }

    .login-wrap {
      max-width: 420px;
      margin: 80px auto;
      text-align: center
    }

    .login-wrap .card {
      padding: 40px
    }

    .login-wrap input {
      width: 100%;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 14px;
      transition: var(--transition)
    }

    .login-wrap input:focus {
      border-color: var(--accent)
    }

    .login-wrap input::placeholder {
      color: var(--text-muted)
    }

    .error-msg {
      color: var(--danger);
      font-size: 0.85rem;
      margin-bottom: 12px
    }

    /* Dashboard */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px
    }

    .dash-header h1 {
      font-size: 1.6rem;
      font-weight: 700
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px
    }

    .stat-card {
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center
    }

    .stat-num {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .stat-label {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-top: 4px
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--glass);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
      overflow-x: auto
    }

    .tab {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      border: none;
      background: none;
      font-family: inherit
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600
    }

    /* Charts grid */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      margin-bottom: 24px
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px
    }

    .chart-card h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.4
    }

    .chart-card canvas {
      max-height: 260px
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--glass-border)
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem
    }

    th {
      background: rgba(232, 57, 28, 0.08);
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0
    }

    td {
      padding: 10px 14px;
      border-top: 1px solid var(--glass-border);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    tr:hover td {
      background: rgba(0, 0, 0, 0.02)
    }

    .expand-btn {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-family: inherit
    }

    .delete-btn {
      background: none;
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 6px;
      color: var(--danger);
      cursor: pointer;
      padding: 4px 10px;
      font-size: 0.8rem;
      font-family: inherit;
      transition: var(--transition)
    }

    .delete-btn:hover {
      background: var(--danger);
      color: #fff
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px
    }

    .modal {
      background: #1a1a2e;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      max-width: 700px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 32px
    }

    .modal h2 {
      margin-bottom: 20px;
      font-size: 1.2rem
    }

    .modal .detail-row {
      margin-bottom: 14px
    }

    .modal .detail-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 2px
    }

    .modal .detail-value {
      font-size: 0.92rem;
      line-height: 1.5
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.4rem;
      cursor: pointer
    }

    /* Footer link */
    .admin-link {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-decoration: none;
      opacity: 0.4;
      transition: var(--transition)
    }

    .admin-link:hover {
      opacity: 1;
      color: var(--accent)
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a2e;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 14px 24px;
      z-index: 2000;
      font-size: 0.9rem;
      transition: transform 0.4s cubic-bezier(.4, 0, .2, 1);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .toast.show {
      transform: translateX(-50%) translateY(0)
    }

    .toast.success {
      border-color: var(--accent3)
    }

    .toast.error {
      border-color: var(--danger)
    }

    /* Responsive */
    @media(max-width:600px) {
      .app {
        padding: 12px
      }

      .card {
        padding: 20px 16px
      }

      .btn {
        padding: 12px 20px;
        font-size: 0.88rem
      }

      .rating-row {
        gap: 6px
      }

      .rating-row .opt {
        min-width: 44px;
        padding: 12px 4px
      }

      .charts-grid {
        grid-template-columns: 1fr
      }

      .admin-wrap {
        padding: 12px
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px
    }

    /* Loading spinner */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--glass-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ============ SURVEY VIEW ============ -->
  <div id="surveyView" class="app">
    <div class="header">
      <div class="badge">🗳️ Sondage anonyme</div>
      <h1>Votre avis compte !</h1>
      <p class="subtitle">CGT & CFDT — CC Marches du Velay Rochebaron</p>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-info"><span id="stepLabel">Introduction</span><span id="stepCount"></span></div>
    </div>
    <div id="stepsContainer"></div>
  </div>

  <!-- ============ ADMIN VIEW ============ -->
  <div id="adminView" class="hidden">
    <!-- Login -->
    <div id="adminLogin" class="login-wrap">
      <div class="card" style="opacity:1;transform:none">
        <div style="font-size:2.5rem;margin-bottom:16px">🔐</div>
        <h2 style="margin-bottom:6px">Espace Administrateur</h2>
        <p style="color:var(--text-dim);font-size:0.9rem;margin-bottom:24px">Connectez-vous pour accéder aux résultats
        </p>
        <div id="loginError" class="error-msg hidden"></div>
        <input type="email" id="loginEmail" placeholder="Email" value="admin@ccmvr.fr">
        <input type="password" id="loginPass" placeholder="Mot de passe">
        <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Se
          connecter</button>

    ];

    const TOTAL_STEPS = STEPS.length;
    const FIELD_LABELS = {};
    STEPS.forEach(s => s.questions.forEach(q => { FIELD_LABELS[q.id] = q.label }));

    /* Build steps HTML */
    function buildSteps() {
      const c = document.getElementById('stepsContainer');
      STEPS.forEach((step, i) => {
        const div = document.createElement('div');
        div.className = 'step' + (i === 0 ? '' : ' hidden');
        div.id = 'step' + i;
        const si = SECTION_ICONS[i] || SECTION_ICONS[0];
        if (step.isIntro) {
          div.innerHTML = `<div class="card intro-card" style="animation-delay:0.1s">
        <div class="section-icon" style="background:${si.bg}">${si.icon}</div>
        <h2 class="section-title">Bienvenue !</h2>
        <p style="color:var(--text-dim);line-height:1.8;margin-bottom:8px">Chères collègues, chers collègues, vos représentants <strong style="color:var(--accent)">CGT</strong> et <strong style="color:var(--accent2)">CFDT</strong> s'unissent pour recueillir votre avis.</p>
        <p style="color:var(--text-dim);line-height:1.8;margin-bottom:8px">Ce sondage est <strong style="color:var(--accent3)">totalement anonyme</strong>. Vos réponses nous permettront de porter vos revendications avec plus de force, notamment sur la <strong>transparence du RIFSEEP</strong> et l'amélioration de nos <strong>conditions de travail</strong>.</p>
        <p style="color:var(--text-dim);line-height:1.8">Merci pour votre temps. 🙏</p>

      </div>`;
        } else if (step.isThankYou) {
          div.innerHTML = `<div class="card" style="animation-delay:0.1s"><div class="thankyou">
        <div class="check-circle">✓</div>
        <h2>Merci pour votre participation !</h2>
        <p style="color:var(--text-dim);max-width:450px;margin:0 auto">Vos réponses ont été envoyées de manière anonyme. Elles seront précieuses pour défendre vos droits et améliorer vos conditions de travail.</p>
        <p style="margin-top:20px;font-size:1.2rem">✊ CGT & CFDT — Ensemble, plus forts.</p>
      </div></div>`;
        } else {
          let qh = '';
          step.questions.forEach((q, qi) => {
            const num = qi + 1;
            if (q.type === 'radio_avec_autre') {
              qh += `<div class="question"><span class="q-label"><span class="q-num">${num}.</span>${q.label}</span><div class="options">${q.options.map(o => `<label class="opt"><input type="radio" name="${q.id}" value="${o}" onchange="document.getElementById('autre_${q.id}').style.display=this.value==='Autre'?'block':'none'"><span class="mark"></span><span class="opt-text">${o}</span></label>`).join('')
                }</div><input type="text" id="autre_${q.id}" class="autre-input" name="${q.id}_autre" placeholder="Précisez votre pôle ou service..." style="display:none"></div>`;
            } else if (q.type === 'radio') {
              qh += `<div class="question"><span class="q-label"><span class="q-num">${num}.</span>${q.label}</span><div class="options">${q.options.map(o => `<label class="opt"><input type="radio" name="${q.id}" value="${o}"><span class="mark"></span><span class="opt-text">${o}</span></label>`).join('')
                }</div></div>`;

              qh += `<div class="question"><span class="q-label"><span class="q-num">${num}.</span>${q.label}</span><div class="options rating-row">${q.options.map((o, oi) => `<label class="opt"><input type="radio" name="${q.id}" value="${o}"><span class="mark"></span><span class="opt-text">${o}</span><span class="opt-sublabel">${q.labels[oi]}</span></label>`).join('')
                }</div></div>`;

              qh += `<div class="question"><span class="q-label"><span class="q-num">${num}.</span>${q.label}</span><div class="options">${q.options.map(o => `<label class="opt checkbox"><input type="checkbox" name="${q.id}" value="${o}"><span class="mark"></span><span class="opt-text">${o}</span></label>`).join('')
                }</div></div>`;

              qh += `<div class="question"><span class="q-label"><span class="q-num">${num}.</span>${q.label}</span><textarea class="text-input" name="${q.id}" placeholder="Votre réponse..."></textarea></div>`;

    /* Navigation */
    function updateProgress() {
      const pct = Math.round((currentStep / (TOTAL_STEPS - 1)) * 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('stepLabel').textContent = STEPS[currentStep].title || '';
      document.getElementById('stepCount').textContent = `Étape ${currentStep + 1} / ${TOTAL_STEPS}`;
    }
    function showStep(n) {
      document.querySelectorAll('.step').forEach((s, i) => { s.classList.toggle('hidden', i !== n); if (i === n) { s.querySelector('.card').style.animation = 'none'; requestAnimationFrame(() => { s.querySelector('.card').style.animation = 'fadeUp 0.5s ease forwards' }); } });
      currentStep = n; updateProgress(); window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextStep() {
      if (currentStep < TOTAL_STEPS - 1) {
        const step = STEPS[currentStep];
        for (const q of step.questions) {
          if (q.required && (q.type === 'radio' || q.type === 'radio_avec_autre')) {
            const v = document.querySelector(`input[name="${q.id}"]:checked`);
            if (!v) { toast('Veuillez répondre à la question obligatoire.', 'error'); return; }
          }
        }
        showStep(currentStep + 1);
      }
    }
    function prevStep() { if (currentStep > 0) showStep(currentStep - 1); }

    /* Collect form data */
    function collectData() {
      const data = {};
      STEPS.forEach(step => {
        step.questions.forEach(q => {
          if (q.type === 'radio_avec_autre') {
            const el = document.querySelector(`input[name="${q.id}"]:checked`);
            let val = el ? el.value : null;
            if (val === 'Autre') {
              const autreInput = document.getElementById('autre_' + q.id);
              if (autreInput && autreInput.value.trim()) val = 'Autre : ' + autreInput.value.trim();
            }
            data[q.id] = val;
          } else if (q.type === 'radio' || q.type === 'rating') {
            const el = document.querySelector(`input[name="${q.id}"]:checked`);
            data[q.id] = el ? el.value : null;
            if (q.id === 'ambiance_equipe' && data[q.id]) data[q.id] = parseInt(data[q.id]);
          } else if (q.type === 'checkbox') {
            const checked = [...document.querySelectorAll(`input[name="${q.id}"]:checked`)].map(e => e.value);
            data[q.id] = checked;
          } else {
            const el = document.querySelector(`textarea[name="${q.id}"]`);
            data[q.id] = el ? el.value.trim() || null : null;
          }
        });
      });
      return data;
    }

    /* Submit */
    async function submitSurvey() {
      const data = collectData();
      if (!data.service_pole) { toast('Veuillez sélectionner votre pôle/service.', 'error'); return; }
      const btn = document.querySelector('.btn-success');
      btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:20px;height:20px;margin:0;border-width:2px"></span> Envoi...';
      try {
        const { error } = await sb.from('survey_responses').insert([data]);
        if (error) throw error;
        showStep(TOTAL_STEPS - 1);
        document.querySelector('.progress-wrap').classList.add('hidden');
      } catch (e) {
        console.error(e); toast('Erreur lors de l\'envoi. Réessayez.', 'error');
        btn.disabled = false; btn.innerHTML = '✅ Envoyer mes réponses';
      }
    }

    /* Toast */
    function toast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    /* ============ ADMIN ============ */
    let allResponses = [];
    async function doLogin() {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      document.getElementById('loginError').classList.add('hidden');
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('adminDash').classList.remove('hidden');
        await loadDashboard();
      } catch (e) {
        const el = document.getElementById('loginError'); el.textContent = e.message || 'Identifiants invalides'; el.classList.remove('hidden');
      }
    }
    async function doLogout() {
      await sb.auth.signOut();
      location.hash = ''; location.reload();
    }

    async function loadDashboard() {
      const { data, error } = await sb.from('survey_responses').select('*').order('created_at', { ascending: false });
      if (error) { toast('Erreur chargement: ' + error.message, 'error'); return; }
      allResponses = data || [];
      renderStats(); renderTabs();
    }

    function renderStats() {
      const n = allResponses.length;
      const services = {};
      allResponses.forEach(r => { services[r.service_pole] = (services[r.service_pole] || 0) + 1 });
      const topService = Object.entries(services).sort((a, b) => b[1] - a[1])[0];
      const today = new Date().toISOString().slice(0, 10);
      const todayCount = allResponses.filter(r => r.created_at.slice(0, 10) === today).length;
      document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">Réponses totales</div></div>
    <div class="stat-card"><div class="stat-num">${Object.keys(services).length}</div><div class="stat-label">Services représentés</div></div>
    <div class="stat-card"><div class="stat-num">${todayCount}</div><div class="stat-label">Réponses aujourd'hui</div></div>
    <div class="stat-card"><div class="stat-num">${topService ? topService[1] : 0}</div><div class="stat-label">${topService ? topService[0].replace(/\(.*/, '').trim() : '—'}</div></div>`;
    }

    const ADMIN_TABS = ['Vue globale', 'Réponses individuelles'];
    let activeTab = 0;
    function renderTabs() {
      document.getElementById('adminTabs').innerHTML = ADMIN_TABS.map((t, i) => `<button class="tab${i === activeTab ? ' active' : ''}" onclick="switchTab(${i})">${t}</button>`).join('');
      renderTabContent();
    }
    function switchTab(i) { activeTab = i; renderTabs(); }

    function renderTabContent() {
      const c = document.getElementById('tabContent');
      if (activeTab === 0) renderOverview(c);
      else renderTable(c);
    }

    function renderOverview(c) {
      chartInstances.forEach(ci => ci.destroy()); chartInstances = [];
      const fields = STEPS.flatMap(s => s.questions).filter(q => q.type === 'radio' || q.type === 'rating' || q.type === 'checkbox');
      let html = '<div class="charts-grid">';
      fields.forEach(q => { html += `<div class="chart-card"><h3>${q.label.length > 90 ? q.label.slice(0, 90) + '…' : q.label}</h3><canvas id="chart_${q.id}"></canvas></div>`; });
      html += '</div>';
      c.innerHTML = html;
      fields.forEach(q => {
        const canvas = document.getElementById('chart_' + q.id); if (!canvas) return;
        const counts = {};
        if (q.type === 'checkbox') {
          allResponses.forEach(r => { const arr = r[q.id] || []; arr.forEach(v => { counts[v] = (counts[v] || 0) + 1 }) });
        } else {
          (q.options || []).forEach(o => counts[o] = 0);
          allResponses.forEach(r => { const v = r[q.id]; if (v != null) counts[String(v)] = (counts[String(v)] || 0) + 1 });
        }
        const labels = Object.keys(counts); const values = Object.values(counts);
        const ci = new Chart(canvas, {
          type: q.type === 'checkbox' ? 'bar' : 'doughnut',
          data: { labels, datasets: [{ data: values, backgroundColor: COLORS.slice(0, labels.length), borderWidth: 0, borderRadius: q.type === 'checkbox' ? 6 : 0 }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom', labels: { color: '#fffffe', font: { size: 11 }, padding: 10, boxWidth: 12 } }, tooltip: { backgroundColor: '#1a1a2e', titleColor: '#fff', bodyColor: '#fff', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1 } }, scales: q.type === 'checkbox' ? { x: { ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,0.05)' } }, y: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } } } : {} }
        });
        chartInstances.push(ci);
      });
    }

    function renderTable(c) {
      if (!allResponses.length) { c.innerHTML = '<div class="card" style="opacity:1;transform:none;text-align:center;padding:60px"><p style="color:var(--text-dim)">Aucune réponse pour le moment.</p></div>'; return; }
      const cols = ['created_at', 'service_pole', 'bien_etre_general', 'ambiance_equipe', 'satisfaction_direction'];
      let html = '<div class="table-wrap"><table><thead><tr><th>#</th><th>Date</th><th>Service</th><th>Bien-être</th><th>Ambiance</th><th>Direction</th><th>Actions</th></tr></thead><tbody>';
      allResponses.forEach((r, i) => {
        const d = new Date(r.created_at);
        html += `<tr>
      <td>${i + 1}</td>
      <td>${d.toLocaleDateString('fr-FR')} ${d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}</td>
      <td title="${r.service_pole}">${(r.service_pole || '').replace(/\(.*/, '').trim()}</td>
      <td>${r.bien_etre_general || '—'}</td>
      <td>${r.ambiance_equipe || '—'}/5</td>
      <td>${r.satisfaction_direction || '—'}</td>
      <td style="display:flex;gap:6px"><button class="expand-btn" onclick="showDetail(${i})">Détail</button><button class="delete-btn" onclick="deleteResponse('${r.id}')" title="Supprimer">🗑</button></td>
    </tr>`;
      });
      html += '</tbody></table></div>';
      c.innerHTML = html;
    }

    function showDetail(idx) {
      const r = allResponses[idx]; if (!r) return;
      const fields = STEPS.flatMap(s => s.questions);
      let html = `<h2>Réponse #${idx + 1} — ${new Date(r.created_at).toLocaleDateString('fr-FR')}</h2>`;
      fields.forEach(q => {
        let val = r[q.id];
        if (Array.isArray(val)) val = val.join(', ');
        html += `<div class="detail-row"><div class="detail-label">${q.label}</div><div class="detail-value">${val || '<em style="color:var(--text-muted)">Non renseigné</em>'}</div></div>`;
      });
      html += `<div class="btn-row" style="justify-content:space-between"><button class="btn btn-danger" onclick="deleteResponse('${r.id}')">🗑 Supprimer cette réponse</button><button class="btn btn-secondary" onclick="closeModal()">Fermer</button></div>`;
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('modalOverlay').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modalOverlay').classList.add('hidden'); }

    async function deleteResponse(id) {
      if (!confirm('Êtes-vous sûr de vouloir supprimer cette réponse ? Cette action est irréversible.')) return;
      try {
        const { error } = await sb.from('survey_responses').delete().eq('id', id);
        if (error) throw error;
        toast('Réponse supprimée avec succès.', 'success');
        closeModal();
        await loadDashboard();
      } catch (e) {
        console.error(e); toast('Erreur lors de la suppression: ' + e.message, 'error');
      }
    }

    /* Exports */
    function buildExportData() {
      const fields = STEPS.flatMap(s => s.questions);
      return allResponses.map((r, i) => {
        const row = { '#': i + 1, 'Date': new Date(r.created_at).toLocaleDateString('fr-FR') };
        fields.forEach(q => {
          let val = r[q.id];
          if (Array.isArray(val)) val = val.join(', ');
          row[q.label.slice(0, 80)] = val || '';
        });
        return row;
      });
    }
    function exportCSV() {
      const rows = buildExportData(); if (!rows.length) return toast('Aucune donnée', 'error');
      const keys = Object.keys(rows[0]);
      const csv = [keys.map(k => '"' + k.replace(/"/g, '""') + '"').join(';'), ...rows.map(r => keys.map(k => '"' + String(r[k] || '').replace(/"/g, '""') + '"').join(';'))].join('\n');
      downloadFile(csv, 'resultats_sondage.csv', 'text/csv;charset=utf-8');
    }
    function exportExcel() {
      const rows = buildExportData(); if (!rows.length) return toast('Aucune donnée', 'error');
      const ws = XLSX.utils.json_to_sheet(rows);
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Résultats');
      XLSX.writeFile(wb, 'resultats_sondage.xlsx');
    }
    function downloadFile(content, name, type) {
      const blob = new Blob(['\ufeff' + content], { type });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click();
    }

    /* Routing */
    function showSurvey() { document.getElementById('surveyView').classList.remove('hidden'); document.getElementById('adminView').classList.add('hidden'); location.hash = ''; }
    function showAdmin() { document.getElementById('surveyView').classList.add('hidden'); document.getElementById('adminView').classList.remove('hidden'); }

    async function handleRoute() {
      if (location.hash === '#admin') {
        showAdmin();
        const { data } = await sb.auth.getSession();
        if (data?.session) {
          document.getElementById('adminLogin').classList.add('hidden');
          document.getElementById('adminDash').classList.remove('hidden');
          await loadDashboard();
        }
      } else { showSurvey(); }
    }

    /* Keyboard */
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    /* Init */
    buildSteps(); updateProgress(); handleRoute();
    window.addEventListener('hashchange', handleRoute);
  </script>
</body>

</html>
